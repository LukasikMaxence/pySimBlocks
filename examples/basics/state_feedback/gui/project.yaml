schema_version: 1

project:
  name: state_feedback_gui

simulation:
  dt: 0.02
  T: 2.0
  solver: fixed
  clock: internal
  external_module: parameters.py
  logging:
    - controller.outputs.u
    - step.outputs.out
    - system.outputs.x
    - system.outputs.y
  plots:
    - title: Ref vs Output
      mode: overlay
      signals: [step.outputs.out, system.outputs.y]
    - title: Command
      mode: overlay
      signals: [controller.outputs.u]
    - title: Full closed-loop (components)
      mode: split_components
      signals: [step.outputs.out, system.outputs.y, controller.outputs.u, system.outputs.x]
    - title: Tracking and states
      mode: split_signals
      signals: [step.outputs.out, system.outputs.y, system.outputs.x]
    - title: States only
      mode: split_components
      signals: [system.outputs.x]

diagram:
  blocks:
    - name: controller
      category: controllers
      type: state_feedback
      parameters:
        K: '#K'
        G: '#G'
    - name: step
      category: sources
      type: step
      parameters:
        value_before: [[0.0]]
        value_after: [[1.0]]
        start_time: 0.5
    - name: system
      category: systems
      type: linear_state_space
      parameters:
        A: '#A'
        B: '#B'
        C: '#C'

  connections:
    - name: c1
      ports: [controller.u, system.u]
    - name: c2
      ports: [system.x, controller.x]
    - name: c3
      ports: [step.out, controller.r]

gui:
  layout:
    blocks:
      controller:
        x: 25.0
        y: -18.0
        orientation: normal
        width: 120.0
        height: 60.0
      step:
        x: -170.0
        y: -30.0
        orientation: normal
        width: 120.0
        height: 60.0
      system:
        x: 195.0
        y: -15.0
        orientation: normal
        width: 120.0
        height: 60.0
    connections:
      c2:
        route: [[330.0, 5.0], [338.0, 5.0], [338.0, 70.0], [11.0, 70.0], [11.0, 22.0], [19.0, 22.0]]
